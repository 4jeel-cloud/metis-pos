include:
    - docker/docker-mysql.yml

services:
    ospos:
        build:
            context: .
            target: ospos
        restart: always
        depends_on:
            - mysql
        ports:
            - "80:80"
        networks:
            - app_net
        volumes:
            - uploads:/app/public/uploads
            - logs:/app/writable/logs
            - ./public/images:/app/public/images
            - ./.env:/app/.env
            - ./app/Views:/app/app/Views
            - ./app/Language:/app/app/Language
            - ./app/Controllers:/app/app/Controllers
            - ./app/Config/Email.php:/app/app/Config/Email.php
            - ./app/Config/App.php:/app/app/Config/App.php
            - ./app/Database/Migrations/sqlscripts:/app/app/Database/Migrations/sqlscripts
        environment:
            - CI_ENVIRONMENT=production
            - ALLOWED_HOSTNAMES=localhost
            - FORCE_HTTPS=false
            - PHP_TIMEZONE=UTC
            - MYSQL_USERNAME=admin
            - MYSQL_PASSWORD=pointofsale
            - MYSQL_DB_NAME=ospos
            - MYSQL_HOST_NAME=mysql
